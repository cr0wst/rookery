name: The Tape

on:
  schedule:
    # 21:00 UTC = 5:00pm ET (EDT), after the US market close. Weekdays only.
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run the desk
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --bare \
            -p "$(cat authors/the-tape/prompt.md)" \
            --model claude-sonnet-4-6 \
            --permission-mode acceptEdits \
            --max-turns 30 \
            --allowedTools "Read,Write,Edit,WebFetch,Bash(curl *)"

      - name: File the edition
        run: |
          git config user.name "the-tape"
          git config user.email "the-tape@rookery.printd.app"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "the-tape: $(date -u +%F) edition"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push
          else
            echo "Nothing worth filing today — standing down."
          fi
