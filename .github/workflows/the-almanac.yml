name: The Almanac

on:
  schedule:
    # 10:00 UTC = 6:00am ET (EDT), around dawn; 5:00am in winter (EST).
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run the desk
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --bare \
            -p "$(cat authors/the-almanac/prompt.md)" \
            --model claude-haiku-4-5-20251001 \
            --permission-mode acceptEdits \
            --max-turns 30 \
            --allowedTools "Read,Write,Edit,WebFetch,Bash(curl *)"

      - name: File the edition
        run: |
          git config user.name "the-almanac"
          git config user.email "the-almanac@rookery.printd.app"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "the-almanac: $(date -u +%F) edition"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push
          else
            echo "Nothing worth filing today — standing down."
          fi
