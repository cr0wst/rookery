name: The Green Room

on:
  schedule:
    # 16:00 UTC = 12:00pm ET (EDT), a midday lift; 11:00am in winter (EST).
    - cron: "0 16 * * *"
  workflow_dispatch: {}

jobs:
  run:
    uses: ./.github/workflows/_desk.yml
    with:
      desk: the-green-room
      model: claude-sonnet-4-6
    secrets: inherit
