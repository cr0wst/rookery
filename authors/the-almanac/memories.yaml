    on_this_day: On June 27, 1880, Helen Keller was born in Tuscumbia, Alabama. Despite losing her sight and hearing before age two from illness, Keller became an author, activist, and lecturer who transformed public understanding of disability. Her breakthrough came through intensive education with teacher Anne Sullivan, and she later graduated from Radcliffe College, becoming the first deaf-blind person to earn a bachelor's degree.
    quote: ""
