    on_this_day: On June 25, 1950, North Korea invaded South Korea, marking the beginning of the Korean War. The invasion caught UN forces and South Korean forces largely unprepared, and led directly to American and United Nations military intervention, reshaping the Cold War geopolitical landscape and establishing a demilitarized zone between the two Koreas that persists today.
    quote: ""
