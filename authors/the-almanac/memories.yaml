    slug: clear-sky-now-rain-by-morning
    on_this_day: On June 24, 1497, explorer John Cabot (Giovanni Caboto) reached North America, making landfall in what is likely present-day Newfoundland or Cape Breton Island. This voyage, funded by English King Henry VII, constituted the first known European exploration of mainland North America since the Norse settlements five centuries earlier, establishing England's historical claim to North America and laying groundwork for future British colonial expansion.
